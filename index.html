<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЗооРынок 🐾</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f2f4f5; padding-bottom: 100px; width: 100%; overflow-x: hidden; }
        header { background: #002f34; color: white; padding: 15px; text-align: center; }
        .search-box { padding: 10px; background: white; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 20px; }
        .categories { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: white; }
        .cat-btn { padding: 8px 15px; border: 1px solid #002f34; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; margin-bottom: 5px; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: space-around; background: #002f34; padding: 10px 20px; border-radius: 35px; width: 95%; max-width: 400px; color: white; z-index: 1000; }
        .btn-add-center { background: #ff5a5f; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; border: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .content { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; max-height: 85vh; overflow-y: auto; }
        .field { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-align: center; display: block; }
        .btn-chat { background: #002f34; color: white; }
        .btn-call { background: #28a745; color: white; margin-left: 10px; }
        .slider-container { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 5px; margin-bottom: 10px; }
        .slider-img { width: 100%; height: 250px; object-fit: cover; display: none; }
        .slider-img.active { display: block; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>ЗооРынок 🐾</h1></header>
<div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск..." oninput="renderAds()">
</div>
<div class="categories">
    <div class="cat-btn" onclick="filterCat('')">Все</div>
    <div class="cat-btn" onclick="filterCat('Веттовары')">Веттовары</div>
    <div class="cat-btn" onclick="filterCat('Комбикорма')">Комбикорма</div>
    <div class="cat-btn" onclick="filterCat('Сельхозживотные')">Сельхозживотные</div>
    <div class="cat-btn" onclick="filterCat('Домашние питомцы')">Питомцы</div>
</div>

<div class="grid" id="grid"><p style="padding:20px;">Загрузка объявлений...</p></div>

<div class="bottom-nav">
    <button onclick="resetApp()" style="background:none; border:none; color:white; font-size:24px;">🏠</button>
    <button onclick="showFavorites()" style="background:none; border:none; color:#ff5a5f; font-size:26px;">♥️</button>
    <button class="btn-add-center" onclick="showModal('form')">+</button>
    <button onclick="showMyChats()" style="background:none; border:none; color:white; font-size:24px;">💬</button>
    <button onclick="manageMyAds()" style="background:none; border:none; color:white; font-size:24px;">👤</button>
</div>

<!-- Модальные окна (остались прежними) -->
<div id="form" class="modal"><div class="content">
    <h2>Новое объявление</h2>
    <input id="title" class="field" placeholder="Название">
    <input id="city" class="field" placeholder="Город">
    <input id="price" class="field" type="number" placeholder="Цена">
    <input id="breed" class="field" placeholder="Порода">
    <input id="phone" class="field" type="tel" placeholder="Ваш номер">
    <select id="category" class="field">
        <option value="Веттовары">Веттовары</option><option value="Комбикорма">Комбикорма</option>
        <option value="Сельхозживотные">Сельхозживотные</option><option value="Домашние питомцы">Питомцы</option>
    </select>
    <textarea id="desc" class="field" placeholder="Описание"></textarea>
    <label for="photoInput" style="display:block; padding:10px; background:#e0e0e0; border-radius:5px; text-align:center; cursor:pointer;">📸 Выбрать фото</label>
    <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="previewPhotos()">
    <div id="previewArea" style="display:flex; gap:5px; margin-top:10px; overflow-x:auto;"></div>
    <button id="saveBtn" class="action-btn btn-chat" onclick="saveAd()" style="width:100%; margin-top:10px;">Опубликовать</button>
    <button onclick="hideModal('form')" style="width:100%; margin-top:10px; background:none; border:none; color:red;">Отмена</button>
</div></div>

<div id="viewModal" class="modal"><div class="content" id="viewContent"></div></div>
<div id="chatModal" class="modal"><div class="content">
    <h3>Чат</h3>
    <div id="messages" style="height:200px; overflow-y:auto; border:1px solid #ccc; margin-bottom:10px; padding:5px;"></div>
    <textarea id="msgText" class="field" placeholder="Сообщение..."></textarea>
    <button class="action-btn btn-chat" onclick="sendMsg()" style="width:100%">Отправить</button>
    <button onclick="hideModal('chatModal')" style="width:100%; margin-top:5px; background:none; border:none; color:red;">Закрыть</button>
</div></div>

<div id="myChatsModal" class="modal"><div class="content"><h3>Мои чаты</h3><div id="chatsList"></div><button onclick="hideModal('myChatsModal')" style="width:100%; padding:10px; margin-top:10px; background:#002f34; color:white; border:none;">Закрыть</button></div></div>
<div id="favModal" class="modal"><div class="content"><h3>Избранное</h3><div id="favList"></div><button onclick="hideModal('favModal')" style="width:100%; padding:10px; margin-top:10px; background:#002f34; color:white; border:none;">Закрыть</button></div></div>

<script>
    const sb = supabase.createClient('https://qdesomzmhrghygzprftz.supabase.co', 'sb_publishable_ru6cRM3d9mYcDj7tjvAStQ_7rqIftg0');
    let ads = [], myFavs = [], isMyAdsMode = false, activeCat = '', activeAdId = null;

    async function loadData() {
        // Загружаем данные только один раз при старте
        const { data } = await sb.from('ads').select('*').order('id', { ascending: false });
        if (data) ads = data;
        renderAds();
        updateMyFavs();
    }
    
    function resetApp() {
        isMyAdsMode = false; activeCat = ''; document.getElementById('searchInput').value = '';
        renderAds();
    }

    function renderAds() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        let filtered = ads.filter(ad => 
            (ad.title?.toLowerCase().includes(query) || ad.desc?.toLowerCase().includes(query)) && 
            (activeCat === '' || ad.category === activeCat)
        );
        
        if (isMyAdsMode) {
            const myPhone = localStorage.getItem('myPhone');
            filtered = filtered.filter(ad => String(ad.phone).trim() === String(myPhone).trim());
        }

        document.getElementById('grid').innerHTML = filtered.length ? filtered.map(ad => `
            <div class="card">
                <div onclick="openView('${ad.id}')">
                    <img src="${ad.images ? ad.images.split('|')[0] : 'placeholder.jpg'}">
                    <b>${ad.title}</b><br><small>${ad.price} грн</small>
                </div>
                <button onclick="toggleFavorite('${ad.id}')" style="margin-top:5px; width:100%; border:none; background:#eee; cursor:pointer; color: ${myFavs.includes(ad.id) ? 'red' : 'gray'}">♥</button>
                ${isMyAdsMode ? `<button onclick="deleteAd('${ad.id}')" style="margin-top:5px; width:100%; border:none; background:#ffeded; color:red; cursor:pointer;">Удалить</button>` : ''}
            </div>`).join('') : '<p style="padding:15px;">Объявлений пока нет.</p>';
    }

    function manageMyAds() {
        if (!localStorage.getItem('myPhone')) {
            const phone = prompt("Введите ваш номер телефона:");
            if (!phone) return;
            localStorage.setItem('myPhone', phone);
        }
        isMyAdsMode = true;
        renderAds();
    }

    async function deleteAd(adId) {
        if (!confirm("Удалить?")) return;
        await sb.from('ads').delete().eq('id', adId);
        ads = ads.filter(a => a.id != adId);
        renderAds();
    }

    // Запуск
    loadData();
    
    // Остальные функции (toggleFavorite, saveAd, openChat и т.д.) без изменений, они работают быстро
    async function updateMyFavs() {
        const name = localStorage.getItem('myChatName');
        if (!name) return;
        const { data } = await sb.from('favorites').select('ad_id').eq('user_name', name);
        myFavs = data?.map(f => f.ad_id) || [];
        renderAds();
    }
    
    function filterCat(cat) { activeCat = cat; isMyAdsMode = false; renderAds(); }
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    
    // ... остальной твой код (openView, moveSlide, openChat, sendMsg, saveAd, previewPhotos) оставляй как был ...
</script>
</body>
</html>
