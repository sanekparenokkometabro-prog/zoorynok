<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЗооРынок 🐾</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f2f4f5; padding-bottom: 100px; width: 100%; overflow-x: hidden; }
        header { background: #002f34; color: white; padding: 15px; text-align: center; }
        .search-box { padding: 10px; background: white; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 20px; margin-bottom: 8px; }
        .filters { display: flex; gap: 5px; }
        .field-select { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; margin-bottom: 5px; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: space-around; background: #002f34; padding: 10px 20px; border-radius: 35px; width: 95%; max-width: 400px; color: white; z-index: 1000; }
        .btn-add-center { background: #ff5a5f; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; border: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .content { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; max-height: 85vh; overflow-y: auto; }
        .field { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-align: center; }
        .btn-chat { background: #002f34; color: white; }
    </style>
</head>
<body>

<header><h1>ЗооРынок 🐾</h1></header>

<div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск..." oninput="renderAds()">
    <div class="filters">
        <select id="filterCity" class="field-select" onchange="renderAds()">
            <option value="">Все города</option>
            <option value="Киев">Киев</option><option value="Кривой Рог">Кривой Рог</option>
            <option value="Харьков">Харьков</option><option value="Днепр">Днепр</option>
            <option value="Одесса">Одесса</option>
        </select>
        <select id="filterCat" class="field-select" onchange="renderAds()">
            <option value="">Все категории</option>
            <option value="Веттовары">Веттовары</option><option value="Комбикорма">Комбикорма</option>
            <option value="Сельхозживотные">Сельхозживотные</option><option value="Домашние питомцы">Питомцы</option>
        </select>
    </div>
</div>

<div class="grid" id="grid"><p style="padding:20px; text-align:center;">Загрузка...</p></div>

<!-- ... (Нижняя навигация и Модальные окна оставляем как в вашем исходнике) ... -->
<div class="bottom-nav">
    <button onclick="resetApp()" style="background:none; border:none; color:white; font-size:24px;">🏠</button>
    <button onclick="showFavorites()" style="background:none; border:none; color:#ff5a5f; font-size:26px;">♥️</button>
    <button class="btn-add-center" onclick="showModal('form')">+</button>
    <button onclick="showMyChats()" style="background:none; border:none; color:white; font-size:24px;">💬</button>
    <button onclick="manageMyAds()" style="background:none; border:none; color:white; font-size:24px;">👤</button>
</div>

<!-- Модальные окна (сокращено для удобства, используйте свои полные версии) -->
<div id="form" class="modal"><div class="content">
    <h2>Новое объявление</h2>
    <input id="title" class="field" placeholder="Название">
    <input id="city" class="field" placeholder="Город">
    <input id="price" class="field" type="number" placeholder="Цена">
    <select id="category" class="field">
        <option>Веттовары</option><option>Комбикорма</option><option>Сельхозживотные</option><option>Домашние питомцы</option>
    </select>
    <textarea id="desc" class="field" placeholder="Описание"></textarea>
    <button class="action-btn btn-chat" style="width:100%" onclick="saveAd()">Опубликовать</button>
</div></div>

<script>
    const sb = supabase.createClient('https://qdesomzmhrghygzprftz.supabase.co', 'sb_publishable_ru6cRM3d9mYcDj7tjvAStQ_7rqIftg0');
    let ads = JSON.parse(localStorage.getItem('cached_ads') || '[]');
    let myFavs = [], isMyMode = false, isLoaded = false;

    async function initApp() {
        await loadData();
        isLoaded = true;
        renderAds();
        updateMyFavs();
    }

    async function loadData() {
        const { data } = await sb.from('ads').select('*').order('id', { ascending: false });
        if (data) { ads = data; localStorage.setItem('cached_ads', JSON.stringify(data)); }
    }

    function renderAds() {
        // Получаем значения из фильтров
        const query = document.getElementById('searchInput').value.toLowerCase();
        const cityFilter = document.getElementById('filterCity').value;
        const catFilter = document.getElementById('filterCat').value;

        // Фильтруем массив ads
        let filtered = ads.filter(ad => {
            const matchesQuery = ad.title?.toLowerCase().includes(query) || ad.desc?.toLowerCase().includes(query);
            const matchesCity = cityFilter === '' || ad.city === cityFilter;
            const matchesCat = catFilter === '' || ad.category === catFilter;
            return matchesQuery && matchesCity && matchesCat;
        });

        if (isMyMode) {
            const myPhone = localStorage.getItem('myPhone');
            filtered = filtered.filter(ad => String(ad.phone).trim() === String(myPhone).trim());
        }

        const grid = document.getElementById('grid');
        grid.innerHTML = filtered.length > 0 ? filtered.map(ad => `
            <div class="card">
                <div onclick="openView('${ad.id}')">
                    <img src="${ad.images ? ad.images.split('|')[0] : ''}">
                    <b>${ad.title}</b><br><small>${ad.price} грн</small><br>
                    <small style="color:gray">${ad.city || ''}</small>
                </div>
                <button onclick="toggleFavorite('${ad.id}')" style="width:100%; border:none; background:#eee; color: ${myFavs.includes(Number(ad.id)) ? 'red' : 'gray'}">♥</button>
            </div>`).join('') : '<p style="padding:20px; text-align:center;">Объявлений не найдено</p>';
    }

    function resetApp() { 
        document.getElementById('searchInput').value = '';
        document.getElementById('filterCity').value = '';
        document.getElementById('filterCat').value = '';
        isMyMode = false; renderAds(); 
    }

    // [Остальные функции: saveAd, toggleFavorite, openChat, updateMyFavs и т.д. из вашего исходного кода]
    // Они будут работать без изменений, так как renderAds теперь учитывает фильтры автоматически.

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
