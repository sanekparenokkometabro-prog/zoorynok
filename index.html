<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЗооРынок 🐾</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f2f4f5; padding-bottom: 100px; width: 100%; overflow-x: hidden; }
        header { background: #002f34; color: white; padding: 15px; text-align: center; }
        .search-box { padding: 10px; background: white; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 20px; }
        .categories { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: white; }
        .cat-btn { padding: 8px 15px; border: 1px solid #002f34; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; margin-bottom: 5px; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: space-around; background: #002f34; padding: 10px 20px; border-radius: 35px; width: 95%; max-width: 400px; color: white; z-index: 1000; }
        .btn-add-center { background: #ff5a5f; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; border: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .content { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; max-height: 85vh; overflow-y: auto; }
        .field { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-align: center; display: block; }
        .btn-chat { background: #002f34; color: white; }
        .btn-call { background: #28a745; color: white; margin-left: 10px; }
        .slider-container { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 5px; margin-bottom: 10px; }
        .slider-img { width: 100%; height: 250px; object-fit: cover; display: none; }
        .slider-img.active { display: block; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>ЗооРынок 🐾</h1></header>
<div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск..." oninput="renderAds()">
</div>
<div class="categories">
    <div class="cat-btn" onclick="filterCat('')">Все</div>
    <div class="cat-btn" onclick="filterCat('Веттовары')">Веттовары</div>
    <div class="cat-btn" onclick="filterCat('Комбикорма')">Комбикорма</div>
    <div class="cat-btn" onclick="filterCat('Сельхозживотные')">Сельхозживотные</div>
    <div class="cat-btn" onclick="filterCat('Домашние питомцы')">Питомцы</div>
</div>

<div class="grid" id="grid"></div>

<div class="bottom-nav">
    <button onclick="filterCat('')" style="background:none; border:none; color:white; font-size:24px;">🏠</button>
    <button onclick="showFavorites()" style="background:none; border:none; color:#ff5a5f; font-size:26px;">♥️</button>
    <button class="btn-add-center" onclick="showModal('form')">+</button>
    <button onclick="showMyChats()" style="background:none; border:none; color:white; font-size:24px;">💬</button>
    <button onclick="askPhoneAndRender()" style="background:none; border:none; color:white; font-size:24px;">👤</button>
</div>

<!-- Модальные окна -->
<div id="form" class="modal"><div class="content">
    <h2>Новое объявление</h2>
    <input id="title" class="field" placeholder="Название">
    <input id="city" class="field" placeholder="Город">
    <input id="price" class="field" type="number" placeholder="Цена">
    <input id="breed" class="field" placeholder="Порода">
    <input id="phone" class="field" type="tel" placeholder="Ваш номер">
    <select id="category" class="field">
        <option value="Веттовары">Веттовары</option>
        <option value="Комбикорма">Комбикорма</option>
        <option value="Сельхозживотные">Сельхозживотные</option>
        <option value="Домашние питомцы">Домашние питомцы</option>
    </select>
    <textarea id="desc" class="field" placeholder="Описание"></textarea>
    <label for="photoInput" style="display:block; padding:10px; background:#e0e0e0; border-radius:5px; text-align:center; cursor:pointer;">📸 Выбрать фото</label>
    <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="previewPhotos()">
    <div id="previewArea" style="display:flex; gap:5px; margin-top:10px; overflow-x:auto;"></div>
    <button id="saveBtn" class="action-btn btn-chat" onclick="saveAd()" style="width:100%; margin-top:10px;">Опубликовать</button>
    <button onclick="hideModal('form')" style="width:100%; margin-top:10px; background:none; border:none; color:red;">Отмена</button>
</div></div>

<div id="viewModal" class="modal"><div class="content" id="viewContent"></div></div>
<div id="chatModal" class="modal"><div class="content">
    <h3>Чат</h3>
    <div id="messages" style="height:200px; overflow-y:auto; border:1px solid #ccc; margin-bottom:10px; padding:5px;"></div>
    <textarea id="msgText" class="field" placeholder="Сообщение..."></textarea>
    <button class="action-btn btn-chat" onclick="sendMsg()" style="width:100%">Отправить</button>
    <button onclick="hideModal('chatModal')" style="width:100%; margin-top:5px; background:none; border:none; color:red;">Закрыть</button>
</div></div>

<div id="myChatsModal" class="modal"><div class="content">
    <h3>Мои чаты</h3>
    <div id="chatsList" style="max-height:300px; overflow-y:auto;"></div>
    <button onclick="hideModal('myChatsModal')" style="width:100%; padding:10px; margin-top:10px; background:#002f34; color:white; border:none; border-radius:5px;">Закрыть</button>
</div></div>

<div id="favModal" class="modal"><div class="content">
    <h3>Избранное</h3>
    <div id="favList" style="max-height:300px; overflow-y:auto;"></div>
    <button onclick="hideModal('favModal')" style="width:100%; padding:10px; margin-top:10px; background:#002f34; color:white; border:none; border-radius:5px;">Закрыть</button>
</div></div>

<script>
    const sb = supabase.createClient('https://qdesomzmhrghygzprftz.supabase.co', 'sb_publishable_ru6cRM3d9mYcDj7tjvAStQ_7rqIftg0');
    let ads = [], myFavs = [], activeAdId = null, slideIdx = 0, activeCat = '';

    async function load() {
        const { data } = await sb.from('ads').select('*');
        if (data) ads = data;
        updateMyFavs();
    }
    
    function askPhoneAndRender() {
        const phone = prompt("Введите ваш номер телефона для входа в кабинет:");
        if (phone) { localStorage.setItem('myPhone', phone); renderAds('my'); }
    }

    async function updateMyFavs() {
        const name = localStorage.getItem('myChatName');
        if (name) {
            const { data } = await sb.from('favorites').select('ad_id').eq('user_name', name);
            myFavs = data?.map(f => f.ad_id) || [];
        }
        renderAds();
    }
    function filterCat(cat) { activeCat = cat; renderAds(); }

    function renderAds(mode) {
        const query = document.getElementById('searchInput').value.toLowerCase();
        let filtered = ads.filter(ad => (ad.title?.toLowerCase().includes(query) || ad.desc?.toLowerCase().includes(query)) && (activeCat === '' || ad.category === activeCat));
        if (mode === 'my') filtered = filtered.filter(ad => ad.phone === localStorage.getItem('myPhone'));
        
        document.getElementById('grid').innerHTML = filtered.map(ad => `
            <div class="card">
                <div onclick="openView('${ad.id}')">
                    <img src="${ad.images ? ad.images.split('|')[0] : ''}">
                    <b>${ad.title}</b><br><small>${ad.price} грн</small>
                </div>
                <button onclick="toggleFavorite('${ad.id}')" style="margin-top:5px; width:100%; border:none; background:#eee; border-radius:5px; cursor:pointer; color: ${myFavs.includes(ad.id) ? 'red' : 'gray'}">♥</button>
                ${mode === 'my' ? `<button onclick="deleteAd('${ad.id}')" style="margin-top:5px; width:100%; border:none; background:#ffeded; border-radius:5px; cursor:pointer; color:red;">Удалить</button>` : ''}
            </div>`).join('');
    }

    async function deleteAd(adId) {
        if (!confirm("Удалить это объявление?")) return;
        const { error } = await sb.from('ads').delete().eq('id', adId);
        if (error) alert("Ошибка: " + error.message);
        else location.reload();
    }

    async function toggleFavorite(adId) {
        let name = localStorage.getItem('myChatName') || prompt("Введите ваше имя:");
        if (!name) return; localStorage.setItem('myChatName', name);
        const isFav = myFavs.includes(Number(adId));
        if (isFav) {
            const { data } = await sb.from('favorites').select('id').eq('ad_id', adId).eq('user_name', name);
            if (data?.length) await sb.from('favorites').delete().eq('id', data[0].id);
        } else await sb.from('favorites').insert([{ ad_id: Number(adId), user_name: name }]);
        updateMyFavs();
    }

    function previewPhotos() {
        const input = document.getElementById('photoInput');
        const preview = document.getElementById('previewArea');
        preview.innerHTML = '';
        for (let file of input.files) {
            const reader = new FileReader();
            reader.onload = (e) => { preview.innerHTML += `<img src="${e.target.result}" style="width:60px; height:60px; object-fit:cover; border-radius:5px;">`; }
            reader.readAsDataURL(file);
        }
    }

    async function saveAd() {
        const btn = document.getElementById('saveBtn'); btn.disabled = true;
        const files = document.getElementById('photoInput').files;
        let imgs = [];
        for (let f of files) {
            let b64 = await new Promise(r => { let reader = new FileReader(); reader.onload = () => r(reader.result); reader.readAsDataURL(f); });
            imgs.push(b64);
        }
        const adData = { 
            title: document.getElementById('title').value, phone: document.getElementById('phone').value, 
            price: document.getElementById('price').value, desc: document.getElementById('desc').value, 
            category: document.getElementById('category').value, images: imgs.join('|'),
            breed: document.getElementById('breed').value, city: document.getElementById('city').value 
        };
        const { error } = await sb.from('ads').insert([adData]);
        if (error) { alert("Ошибка: " + error.message); btn.disabled = false; }
        else { alert("Успешно!"); location.reload(); }
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function openView(id) {
        const ad = ads.find(a => a.id == id);
        const imgs = ad.images ? ad.images.split('|') : [];
        slideIdx = 0;
        document.getElementById('viewContent').innerHTML = `
            <h2>${ad.title}</h2>
            <div class="slider-container">
                ${imgs.map((i, idx) => `<img src="${i}" class="slider-img ${idx === 0 ? 'active' : ''}">`).join('')}
                ${imgs.length > 1 ? `<button class="nav-btn" style="left:0" onclick="moveSlide(-1)">❮</button><button class="nav-btn" style="right:0" onclick="moveSlide(1)">❯</button>` : ''}
            </div>
            <p>Цена: ${ad.price} грн</p><p>Порода: ${ad.breed || '-'}</p><p>Город: ${ad.city || '-'}</p>
            <p>Описание: ${ad.desc}</p>
            <button class="action-btn btn-chat" onclick="openChat('${ad.id}')">Написать</button>
            <a href="tel:${ad.phone}" class="action-btn btn-call" style="text-decoration:none;">Позвонить</a>
            <button onclick="hideModal('viewModal')" style="width:100%; margin-top:10px; border:none; background:none;">Закрыть</button>`;
        showModal('viewModal');
    }
    
    function moveSlide(n) {
        const s = document.querySelectorAll('.slider-img');
        if(s.length > 0) { s[slideIdx].classList.remove('active'); slideIdx = (slideIdx + n + s.length) % s.length; s[slideIdx].classList.add('active'); }
    }

    async function openChat(id) {
        activeAdId = id; hideModal('viewModal'); showModal('chatModal');
        const { data } = await sb.from('messages').select('*').eq('ad_id', id).order('created_at', { ascending: true });
        document.getElementById('messages').innerHTML = data?.map(m => `<div><b>${m.sender}:</b> ${m.text}</div>`).join('') || 'Нет сообщений';
    }
    async function sendMsg() {
        const text = document.getElementById('msgText').value;
        if (!text) return;
        await sb.from('messages').insert([{ ad_id: activeAdId, sender: localStorage.getItem('myChatName'), text: text }]);
        document.getElementById('msgText').value = ''; openChat(activeAdId);
    }
    async function showMyChats() {
        showModal('myChatsModal');
        const { data } = await sb.from('messages').select('ad_id').eq('sender', localStorage.getItem('myChatName'));
        document.getElementById('chatsList').innerHTML = [...new Set(data?.map(m => m.ad_id) || [])].map(id => {
            const ad = ads.find(a => a.id == id);
            return `<div style="padding:10px; border-bottom:1px solid #eee;" onclick="openChat('${id}')"><b>${ad ? ad.title : 'Удалено'}</b></div>`;
        }).join('') || 'Нет чатов';
    }
    async function showFavorites() {
        showModal('favModal');
        document.getElementById('favList').innerHTML = myFavs.map(id => {
            const ad = ads.find(a => a.id == id);
            return `<div style="padding:10px; border-bottom:1px solid #eee;">${ad ? ad.title : 'Удалено'}</div>`;
        }).join('') || 'Список пуст';
    }
    load();
</script>
</body>
</html>
