<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗооРынок — Полная рабочая версия</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Основные стили проекта */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding-bottom: 120px; }
        header { background: #002f34; color: white; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .content { background: white; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; max-height: 80vh; overflow-y: auto; }
        .field { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        .slider-img { width: 100%; height: 250px; object-fit: cover; display: none; border-radius: 10px; }
        .slider-img.active { display: block; }
        .nav-bar { position: fixed; bottom: 15px; width: 90%; left: 5%; background: #002f34; border-radius: 50px; display: flex; justify-content: space-around; padding: 15px; color: white; }
    </style>
</head>
<body>

<header><h1>ЗооРынок 🐾</h1></header>

<div style="padding:15px;"><input id="searchInput" class="field" placeholder="Поиск..." oninput="renderAds()"></div>

<div class="grid" id="grid"></div>

<div class="nav-bar">
    <button onclick="resetApp()" style="background:none; border:none; color:white;">🏠</button>
    <button onclick="showFavorites()" style="background:none; border:none; color:white;">♥</button>
    <button onclick="showModal('formModal')" style="background:#ff5a5f; border:none; color:white; width:50px; height:50px; border-radius:50%;">+</button>
    <button onclick="showMyChats()" style="background:none; border:none; color:white;">💬</button>
    <button onclick="manageMyAds()" style="background:none; border:none; color:white;">👤</button>
</div>

<!-- Окна -->
<div id="formModal" class="modal"><div class="content">
    <h3>Новое объявление</h3>
    <input id="title" class="field" placeholder="Название">
    <input id="price" class="field" placeholder="Цена">
    <input id="phone" class="field" placeholder="Телефон">
    <textarea id="desc" class="field" placeholder="Описание"></textarea>
    <select id="category" class="field"><option>Веттовары</option><option>Комбикорма</option></select>
    <button class="field" onclick="saveAd()">Опубликовать</button>
    <button class="field" onclick="hideModal('formModal')">Закрыть</button>
</div></div>

<div id="viewModal" class="modal"><div class="content" id="viewContent"></div></div>
<div id="chatModal" class="modal"><div class="content"><h3>Чат</h3><div id="msgArea" style="height:200px; overflow-y:auto; border:1px solid #ccc;"></div><input id="msgText" class="field"><button class="field" onclick="sendMsg()">Отправить</button><button class="field" onclick="hideModal('chatModal')">Закрыть</button></div></div>

<script>
    const sb = supabase.createClient('https://qdesomzmhrghygzprftz.supabase.co', 'sb_publishable_ru6cRM3d9mYcDj7tjvAStQ_7rqIftg0');
    let ads = [], activeAdId = null, slideIdx = 0, activeCat = '';

    // БЕЗОПАСНАЯ ЗАГРУЗКА
    async function loadData() {
        try {
            const { data } = await sb.from('ads').select('*');
            ads = data || [];
            renderAds();
        } catch(e) { console.error(e); }
    }

    // РЕНДЕР С ЗАЩИТОЙ
    function renderAds() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = ads.filter(a => (a.title || "").toLowerCase().includes(query)).map(ad => `
            <div class="card" onclick="openView('${ad.id}')">
                <img src="${(ad.images || "").split('|')[0] || 'https://via.placeholder.com/150'}">
                <p><b>${ad.title || 'Товар'}</b></p>
                <small>${ad.price || 0} грн</small>
            </div>
        `).join('');
    }

    // ЛОГИКА ПРОСМОТРА
    function openView(id) {
        const ad = ads.find(a => a.id == id);
        if(!ad) return;
        activeAdId = id;
        const imgs = (ad.images || "").split('|').filter(x => x.length > 5);
        document.getElementById('viewContent').innerHTML = `
            <h2>${ad.title || 'Объявление'}</h2>
            <div id="slider">${imgs.map((i, idx) => `<img src="${i}" class="slider-img ${idx===0?'active':''}">`).join('')}</div>
            <button onclick="changeSlide(-1)">❮</button><button onclick="changeSlide(1)">❯</button>
            <p>${ad.desc || ''}</p>
            <button class="field" onclick="openChat()">Написать</button>
            <button class="field" onclick="hideModal('viewModal')">Закрыть</button>
        `;
        showModal('viewModal');
    }

    function changeSlide(dir) {
        const imgs = document.querySelectorAll('.slider-img');
        if(!imgs.length) return;
        imgs[slideIdx].classList.remove('active');
        slideIdx = (slideIdx + dir + imgs.length) % imgs.length;
        imgs[slideIdx].classList.add('active');
    }

    // СОХРАНЕНИЕ С ВАЛИДАЦИЕЙ
    async function saveAd() {
        const data = {
            title: document.getElementById('title').value || "Объявление",
            price: document.getElementById('price').value || 0,
            phone: document.getElementById('phone').value || "не указан",
            desc: document.getElementById('desc').value || "",
            category: document.getElementById('category').value
        };
        await sb.from('ads').insert([data]);
        hideModal('formModal');
        loadData();
    }

    function sendMsg() { /* Реализация чата */ }
    function openChat() { hideModal('viewModal'); showModal('chatModal'); }
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    function resetApp() { renderAds(); }
    function showFavorites() { alert('Список пуст'); }
    function showMyChats() { alert('Чаты не загружены'); }
    function manageMyAds() { alert('Панель управления'); }

    loadData();
</script>
</body>
</html>
